# Site settings
title:            WordPress Security Checklist
description:      "A checklist of actions that you should take to increase the security of your WordPress website."
email:            rafaelfunchal@gmail.com
baseurl:          "" # the subpath of your site, e.g. /blog/
url:              "https://wpsecuritychecklist.org" # the base hostname & protocol for your site
twitter_username: rafaelfunchal
github_username:  rafaelfunchal
image:            "/img/screenshot.png"
# Update when checklist content is meaningfully revised (shown on localized homepages).
checklist_last_updated: "2026-04-17"
markdown:         kramdown
kramdown:
   input:         GFM
exclude:          [ "README.md", "vendor", ".bundle", "Gemfile.lock" ]
encoding:         UTF-8
future:           false

# Permalinks
permalink:   pretty

# Plugins
plugins:
  - github-pages

# Languages (used by the language switcher; strings in _data/strings.yml)
languages:             [ 'en', 'br', 'es', 'ja' ]
